<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès aux supports 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap');
:root{
  --r:#8B0000;--rv:#B22222;--rp:#fdf0f0;--rb:#e8c8c8;
  --n:#1a1a1a;--gf:#2d2d2d;--g:#555;--b:#fefefe;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'EB Garamond',Georgia,serif;background:var(--b);color:var(--n);font-size:18px;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--n);color:#fff;padding:1.8rem 2rem 1.4rem;border-bottom:4px solid var(--r)}
header h1{font-size:clamp(1.3rem,4vw,2rem);font-weight:600}
header h1 span{color:#B22222}
header p{color:#bbb;font-size:.92rem;margin-top:.35rem}
main{flex:1;display:grid;place-items:center;padding:2rem 1rem}
.card{width:min(760px,100%);background:#fff;border:1px solid var(--rb);border-top:4px solid var(--r);padding:1.4rem 1.4rem 1.1rem;box-shadow:0 14px 40px rgba(139,0,0,.08)}
.card h2{font-size:1.25rem;color:var(--r);margin-bottom:.4rem}
.card p{color:var(--g);margin-bottom:1rem}
.form-row{display:grid;grid-template-columns:1fr auto;gap:.6rem}
input[type="password"]{width:100%;padding:.75rem .85rem;border:1px solid var(--rb);font:inherit;border-radius:0}
button{border:1px solid var(--r);background:var(--r);color:#fff;padding:.75rem 1rem;font:inherit;cursor:pointer}
button:hover{background:var(--rv);border-color:var(--rv)}
.message{margin-top:.75rem;min-height:1.6rem;color:var(--g);font-size:.95rem}
.message.error{color:#a40000}
.supports{display:none;margin-top:1rem;border-top:1px solid var(--rb);padding-top:1rem}
.supports h3{font-size:1rem;color:var(--r);margin-bottom:.55rem}
.supports ul{list-style:none}
.supports li+li{margin-top:.5rem}
.supports a{color:var(--rv);text-decoration:none;border-bottom:1px dotted var(--rv)}
.supports a:hover{color:var(--r);border-bottom-color:var(--r)}
footer{background:var(--n);color:#777;text-align:center;padding:1.1rem;font-size:.82rem;border-top:3px solid var(--r)}
footer span{color:#B22222}
@media (max-width:620px){
  .form-row{grid-template-columns:1fr}
  button{width:100%}
}
</style>
</head>
<body>
<header>
  <h1>Supports <span>2026</span></h1>
  <p>Entrez le mot de passe pour afficher les supports disponibles.</p>
</header>

<main>
  <section class="card" aria-labelledby="titre-acces">
    <h2 id="titre-acces">Accès protégé</h2>
    <p>Mot de passe requis.</p>

    <form id="password-form" autocomplete="off">
      <div class="form-row">
        <input id="password-input" type="password" name="password" placeholder="Mot de passe" required>
        <button type="submit">Valider</button>
      </div>
    </form>

    <div id="message" class="message" aria-live="polite"></div>

    <div id="supports" class="supports">
      <h3>Supports disponibles</h3>
      <ul>
        <li><a href="https://rgm-aix.github.io/supports2026/procedurepenale.html">Procédure pénale</a></li>
        <li><a href="https://rgm-aix.github.io/supports2026/societes.html">Droit des sociétés</a></li>
      </ul>
    </div>
  </section>
</main>

<footer>Accès réservé <span>RGM Aix</span></footer>

<script>
(function () {
  var form = document.getElementById('password-form');
  var input = document.getElementById('password-input');
  var message = document.getElementById('message');
  var supports = document.getElementById('supports');
  var expectedPasswordHash = 'd1ed2b01998c12b2400b57a0c2c005d0e774b0bbae8ad36333f2c285ef9fa2fc';

  function toHex(buffer) {
    return Array.from(new Uint8Array(buffer))
      .map(function (b) { return b.toString(16).padStart(2, '0'); })
      .join('');
  }

  function sha256(text) {
    var data = new TextEncoder().encode(text);
    return crypto.subtle.digest('SHA-256', data).then(toHex);
  }

  form.addEventListener('submit', function (event) {
    event.preventDefault();
    sha256(input.value).then(function (hashedInput) {
      if (hashedInput === expectedPasswordHash) {
        message.textContent = 'Mot de passe correct 🐱. Voici les supports disponibles :';
        message.classList.remove('error');
        supports.style.display = 'block';
        input.value = '';
        return;
      }

      message.textContent = 'Mot de passe incorrect.';
      message.classList.add('error');
      supports.style.display = 'none';
      input.focus();
      input.select();
    }).catch(function () {
      message.textContent = 'Erreur technique. Réessayez.';
      message.classList.add('error');
      supports.style.display = 'none';
    });
  });
})();
</script>
</body>
</html>
